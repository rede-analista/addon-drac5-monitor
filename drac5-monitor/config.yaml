name: DRAC 5 Monitor
description: Monitor and control Dell servers with DRAC 5 via IPMI. Exposes power switch and sensors (temperature, fans) to Home Assistant via MQTT auto-discovery.
version: "1.1.0"
slug: drac5_monitor
homeassistant: "2023.1.0"
url: https://github.com/rede-analista/addon-drac5-monitor
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: auto
map:
  - data:rw
options:
  ipmi_host: "172.31.254.99"
  ipmi_user: "root"
  ipmi_password: "calvin"
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  poll_interval: 30
schema:
  ipmi_host: str
  ipmi_user: str
  ipmi_password: str
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_password: str
  poll_interval: int
